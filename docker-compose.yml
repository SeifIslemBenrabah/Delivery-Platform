services:
  # --- Databases ---
  mysql:
    image: mysql:8.0
    container_name: dp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: dp_main
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - delivery-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: dp-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - delivery-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - delivery-net

  # --- Kafka ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - delivery-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - delivery-net

  # --- Microservices ---
  ms-utilisateur:
    build: ./services/ms-utilisateur
    container_name: dp-ms-utilisateur
    restart: on-failure
    environment:
      MS_USER_DATABASE_URL: jdbc:mysql://mysql:3306/dp_users?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: kafka:9092
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - delivery-net

  ms-commande-catalogue:
    build: ./services/ms-commande-catalogue
    container_name: dp-ms-commande
    restart: on-failure
    environment:
      PORT: 8081
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: dp_commandes
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKERS: kafka:9092
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      LIVRAISON_PRICE_STANDARD: 200
      LIVRAISON_PRICE_EXPRESS: 400
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - delivery-net

  ms-optimisation:
    build: ./services/ms-optimisation
    container_name: dp-ms-optimisation
    restart: on-failure
    environment:
      PORT: 8000
      DB_URL: mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/dp_optimisation
      KAFKA_BROKERS: kafka:9092
      GRAPHHOPPER_URL: ${GRAPHHOPPER_URL}
      GRAPHHOPPER_API_KEY: ${GRAPHHOPPER_API_KEY}
      WEIGHT_DISTANCE: "0.6"
      WEIGHT_RATING: "0.4"
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - delivery-net

  ms-suivi:
    build: ./services/ms-suivi
    container_name: dp-ms-suivi
    restart: on-failure
    environment:
      PORT: 3003
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/dp_suivi?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKERS: kafka:9092
      POSITION_TTL_HOURS: 24
    ports:
      - "3003:3003"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - delivery-net

  ms-paiement:
    build: ./services/ms-paiement
    container_name: dp-ms-paiement
    restart: on-failure
    environment:
      PORT: 3004
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: dp_paiement
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CHARGILY_API_KEY: ${CHARGILY_API_KEY}
      CHARGILY_SECRET_KEY: ${CHARGILY_SECRET_KEY}
      CHARGILY_BASE_URL: https://pay.chargily.net/api/v2
      APP_BASE_URL: ${APP_BASE_URL}
      KAFKA_BROKERS: kafka:9092
      MS_UTILISATEUR_URL: http://ms-utilisateur:3001
    ports:
      - "3004:3004"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - delivery-net

  # --- API Gateway (Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: dp-gateway
    restart: on-failure
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ms-utilisateur
      - ms-commande-catalogue
      - ms-optimisation
      - ms-suivi
      - ms-paiement
    networks:
      - delivery-net

  # --- Web Frontend ---
  web:
    build: ./web
    container_name: dp-web
    ports:
      - "5173:80"
    depends_on:
      - nginx
    networks:
      - delivery-net

volumes:
  mysql_data:
  mongo_data:

networks:
  delivery-net:
    driver: bridge