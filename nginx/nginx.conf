events {
    worker_connections 1024;
}

http {
    upstream ms_utilisateur  { server ms-utilisateur:3001; }
    upstream ms_commande      { server ms-commande-catalogue:8081; }
    upstream ms_optimisation  { server ms-optimisation:8000; }
    upstream ms_suivi         { server ms-suivi:3003; }
    upstream ms_paiement      { server ms-paiement:3004; }

    server {
        listen 80;

        # ─── WebSocket support for ms-suivi ─────────────────────────────
        location /ws/ {
            proxy_pass         http://ms_suivi;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host $host;
        }

        # ─── Microservice routing ────────────────────────────────────────
        location /api/auth/      { proxy_pass http://ms_utilisateur/api/auth/; }
        location /api/users/     { proxy_pass http://ms_utilisateur/api/users/; }
        location /api/orders/    { proxy_pass http://ms_commande/api/orders/; }
        location /api/products/  { proxy_pass http://ms_commande/api/products/; }
        location /api/boutiques/ { proxy_pass http://ms_commande/api/boutiques/; }
        location /api/optimize/  { proxy_pass http://ms_optimisation/api/; }
        location /api/tracking/  { proxy_pass http://ms_suivi/api/tracking/; }
        location /api/payment/   { proxy_pass http://ms_paiement/api/payment/; }

        # ─── Default: serve web app ──────────────────────────────────────
        location / {
            proxy_pass http://web:80;
        }

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}